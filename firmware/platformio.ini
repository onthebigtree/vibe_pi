; ══════════════════════════════════════════════════════════════
; Vibe Pi — Multi-board PlatformIO Configuration
; ══════════════════════════════════════════════════════════════

[platformio]
src_dir = .
include_dir = .
; `pio run` builds these two (unchanged behavior). The signed production target
; below is opt-in only: `pio run -e waveshare-175-amoled-prod`. It is excluded
; here because it intentionally fails to compile until a real OTA key is set.
default_envs = waveshare-175-amoled, hwtest

; ── Shared settings ──
[common]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    lvgl/lvgl@^9.2.0
    links2004/WebSockets@^2.6.1
    bblanchon/ArduinoJson@^7.3.0
    Wire
    SPI
    ESPmDNS
    WebServer
    Preferences
    Update
    HTTPClient

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I.
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=30
    -Iinclude
    -Isrc
    -Ihal
    -Idrivers
    -Iboards

build_src_filter =
    +<src/>
    +<hal/*.cpp>
    +<drivers/display/*.cpp>
    +<drivers/touch/*.cpp>
    +<drivers/power/*.cpp>
    -<boards/>
    -<.git/>
    -<lib/>

; ── ESP32-S3 common ──
[esp32s3]
extends = common
platform = espressif32
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

; ══════════════════════════════════════════════════════════════
; BOARD: Waveshare 1.75" Round AMOLED (default)
; ══════════════════════════════════════════════════════════════
[env:waveshare-175-amoled]
extends = esp32s3
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags =
    ${esp32s3.build_flags}
    -DBOARD_HAS_PSRAM
    -DBOARD_WAVESHARE_175_AMOLED
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
; This board uses CO5300 (QSPI display) + CST9217 (touch).

; ══════════════════════════════════════════════════════════════
; PRODUCTION: Waveshare 1.75" with mandatory OTA signature verification
; Build with: pio run -e waveshare-175-amoled-prod
; Requires a real key in firmware/src/system/ota_pubkey.h (vibe-pi-host ota keygen),
; otherwise it fails at compile time by design — an unsigned image can never ship.
; ══════════════════════════════════════════════════════════════
[env:waveshare-175-amoled-prod]
extends = env:waveshare-175-amoled
build_flags =
    ${env:waveshare-175-amoled.build_flags}
    -DOTA_REQUIRE_SIGNED

; ══════════════════════════════════════════════════════════════
; HARDWARE TEST: Waveshare 1.75" — color fill + touch poll
; ══════════════════════════════════════════════════════════════
[env:hwtest]
extends = esp32s3
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags =
    ${esp32s3.build_flags}
    -DBOARD_HAS_PSRAM
    -DBOARD_WAVESHARE_175_AMOLED
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DHWTEST
build_src_filter =
    +<src/test_hw.cpp>
    +<hal/*.cpp>
    +<drivers/display/*.cpp>
    +<drivers/touch/*.cpp>
